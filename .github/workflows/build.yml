name: Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ESP32-S3 firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build
        env:
          IDF_TARGET: esp32s3

      - name: Report binary size
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          echo '## Binary Size' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          idf.py size 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
